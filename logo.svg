<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 230" width="850" height="230" role="img" aria-label="Runeborn">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5e3a8"/>
      <stop offset="0.5" stop-color="#d8bd75"/>
      <stop offset="1" stop-color="#9c7c34"/>
    </linearGradient>
    <radialGradient id="emblemGlow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#3e83d4" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3e83d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- emblem -->
  <g transform="translate(115 115)" filter="url(#soft)">
    <circle r="96" fill="url(#emblemGlow)"/>
    <circle r="92" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <circle r="74" fill="none" stroke="#3e83d4" stroke-opacity="0.5" stroke-width="3"/>
    <path d="M0 -78 L66 0 L0 78 L-66 0 Z" fill="none" stroke="url(#gold)" stroke-width="6"/>
    <path d="M0 -46 C30 -14 30 14 0 46 C-30 14 -30 -14 0 -46 Z" fill="#4b8c45"/>
    <path d="M0 -46 L0 46" stroke="#0d1117" stroke-width="4"/>
    <circle r="7" fill="#ffe9b0"/>
  </g>

  <!-- wordmark -->
  <text x="232" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="700"
        letter-spacing="4" fill="url(#gold)" filter="url(#soft)">RUNEBORN</text>
  <text x="236" y="172" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700"
        letter-spacing="9" fill="#9fb0c4">GREEN&#160;&#160;VS&#160;&#160;ARCANE</text>
</svg>
