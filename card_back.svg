<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 1075" width="768" height="1075" role="img" aria-label="Card back">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16241c"/>
      <stop offset="0.5" stop-color="#101826"/>
      <stop offset="1" stop-color="#241019"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#d8bd75" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#3e83d4" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7cf8c"/>
      <stop offset="0.5" stop-color="#a8853f"/>
      <stop offset="1" stop-color="#6f5a2c"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="768" height="1075" rx="48" fill="url(#bg)"/>
  <rect x="0" y="0" width="768" height="1075" rx="48" fill="url(#glow)"/>

  <!-- ornate frame -->
  <rect x="34" y="34" width="700" height="1007" rx="34" fill="none" stroke="url(#frame)" stroke-width="10"/>
  <rect x="58" y="58" width="652" height="959" rx="24" fill="none" stroke="#d8bd75" stroke-opacity="0.35" stroke-width="3"/>

  <!-- central emblem -->
  <g transform="translate(384 537)">
    <circle r="210" fill="none" stroke="#d8bd75" stroke-opacity="0.5" stroke-width="4"/>
    <circle r="168" fill="none" stroke="#3e83d4" stroke-opacity="0.45" stroke-width="3"/>
    <!-- diamond rune -->
    <path d="M0 -150 L130 0 L0 150 L-130 0 Z" fill="none" stroke="url(#frame)" stroke-width="9"/>
    <path d="M0 -92 L80 0 L0 92 L-80 0 Z" fill="#0d1117" stroke="#d8bd75" stroke-opacity="0.7" stroke-width="4"/>
    <!-- spark / leaf in the middle -->
    <path d="M0 -64 C46 -20 46 20 0 64 C-46 20 -46 -20 0 -64 Z" fill="#4b8c45" fill-opacity="0.85"/>
    <path d="M0 -64 L0 64" stroke="#0d1117" stroke-width="5"/>
    <circle r="10" fill="#ffe9b0"/>
  </g>

  <!-- corner flourishes -->
  <g stroke="#d8bd75" stroke-opacity="0.45" stroke-width="5" fill="none">
    <path d="M96 96 q60 0 60 60"/>
    <path d="M672 96 q-60 0 -60 60"/>
    <path d="M96 979 q60 0 60 -60"/>
    <path d="M672 979 q-60 0 -60 -60"/>
  </g>
</svg>
